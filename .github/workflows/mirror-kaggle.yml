# Recommended schedule (uncomment when Kaggle credentials are configured and tested):
# schedule:
#   - cron: '0 5 * * 0'  # weekly Sundays at 05:00 UTC

name: mirror-kaggle

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Check that Kaggle credentials are configured
        id: check-secret
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          if [ -z "${KAGGLE_USERNAME:-}" ] || [ -z "${KAGGLE_KEY:-}" ]; then
            echo "Skipping: KAGGLE_USERNAME and/or KAGGLE_KEY not configured"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check-secret.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install kaggle
        if: steps.check-secret.outputs.skip == 'false'
        run: pip install 'kaggle>=1.6,<2'

      - name: Configure Kaggle credentials
        if: steps.check-secret.outputs.skip == 'false'
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.kaggle
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          cfg = Path.home() / ".kaggle" / "kaggle.json"
          cfg.write_text(
              json.dumps(
                  {
                      "username": os.environ["KAGGLE_USERNAME"],
                      "key": os.environ["KAGGLE_KEY"],
                  }
              ),
              encoding="utf-8",
          )
          PY
          chmod 600 ~/.kaggle/kaggle.json

      - name: Prepare Kaggle dataset package
        if: steps.check-secret.outputs.skip == 'false'
        run: |
          set -euo pipefail
          mkdir -p kaggle-package
          cp -r submissions schema README.md LICENSE kaggle-package/
          cat > kaggle-package/dataset-metadata.json <<JSON
          {
            "title": "PUMA Community Submissions (LLM PMO Benchmark)",
            "id": "pumacp/puma-community-submissions",
            "licenses": [{"name": "CC-BY-4.0"}]
          }
          JSON

      - name: Create or version Kaggle dataset
        if: steps.check-secret.outputs.skip == 'false'
        run: |
          set -euo pipefail
          # Decide create-vs-version by checking existence explicitly, because
          # `kaggle datasets create` can exit 0 even when it errors (e.g. on a
          # title collision), which would silently skip a `||` version fallback.
          if kaggle datasets list -m 2>/dev/null | grep -q "puma-community-submissions"; then
            echo "Dataset exists; uploading a new version."
            kaggle datasets version -p kaggle-package -m "Mirror $(date -u +%Y-%m-%d)" -r zip
          else
            echo "Dataset absent; creating it (public)."
            kaggle datasets create -p kaggle-package -u -r zip
          fi

      - name: Verify dataset is publicly accessible
        if: steps.check-secret.outputs.skip == 'false'
        run: |
          set -euo pipefail
          # The kaggle CLI can exit 0 even when create/version errors (observed
          # during Sprint 11' S11'.6), so confirm the public URL really resolves.
          url="https://www.kaggle.com/datasets/pumacp/puma-community-submissions"
          for i in $(seq 1 12); do
            code=$(curl -sL -o /dev/null -w "%{http_code}" "$url" || echo "000")
            echo "Attempt $i/12: HTTP $code"
            case "$code" in
              2*) echo "Dataset is publicly accessible at $url"; exit 0 ;;
            esac
            sleep 10
          done
          echo "ERROR: $url did not return 2xx within ~2 minutes."
          exit 1
