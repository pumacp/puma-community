# Recommended schedule (uncomment when HF_TOKEN is configured and tested):
# schedule:
#   - cron: '0 3 * * *'  # daily at 03:00 UTC

name: Mirror to Hugging Face Dataset

on:
  push:
    branches: [main]
    paths:
      - 'submissions/**'
      - 'schema/**'
      - 'docs/hf-dataset-card.md'
  workflow_dispatch:

concurrency:
  group: mirror-hf-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install huggingface_hub
        run: |
          python -m pip install --upgrade pip
          pip install 'huggingface_hub>=0.27.0,<1.0'

      - name: Run mirror script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/mirror_to_hf.py
