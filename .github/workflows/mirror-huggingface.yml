# Recommended schedule (uncomment when HF_TOKEN is configured and tested):
# schedule:
#   - cron: '0 3 * * *'  # daily at 03:00 UTC

name: mirror-huggingface

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Check that HF_TOKEN is configured
        id: check-secret
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "Skipping: HF_TOKEN not configured"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check-secret.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        if: steps.check-secret.outputs.skip == 'false'
        run: pip install 'huggingface_hub>=0.24,<1'

      - name: Push submissions to Hugging Face dataset
        if: steps.check-secret.outputs.skip == 'false'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python <<'PY'
          import os

          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.create_repo(
              repo_id="pumacp/puma-community-submissions",
              repo_type="dataset",
              exist_ok=True,
          )
          api.upload_folder(
              folder_path="submissions",
              repo_id="pumacp/puma-community-submissions",
              repo_type="dataset",
              path_in_repo="submissions",
              commit_message=f"Mirror submissions @ {os.environ['GITHUB_SHA'][:7]}",
          )
          PY
