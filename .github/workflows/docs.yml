name: Docs

# Build the MkDocs site on every docs-affecting push/PR to main, and publish it
# to GitHub Pages (gh-pages branch) on pushes to main. Independent of the
# submission-validation pipeline (different trigger paths). Uses only the
# auto-provided GITHUB_TOKEN.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch: {}

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install docs dependencies
        run: pip install mkdocs-material
      - name: Build site (strict)
        run: mkdocs build --strict
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Deploy only on direct pushes to main — never from a pull request.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install docs dependencies
        run: pip install mkdocs-material
      - name: Deploy to GitHub Pages (gh-pages branch)
        run: mkdocs gh-deploy --force
