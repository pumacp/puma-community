name: Verify submission integrity

on:
  push:
    branches: [main]
    paths:
      - 'submissions/**.json'
      - '!submissions/**.verified.json'  # avoid loop
  workflow_dispatch:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'gradio_client>=1.5.0' requests

      - name: Run verifier
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/verify_submissions.py

      - name: Commit sidecars (if any)
        run: |
          git config user.name "puma-bot"
          git config user.email "pumacapstoneproject@gmail.com"
          if [ -n "$(git status --porcelain submissions/)" ]; then
            git add submissions/*.verified.json
            git commit -m "ci: add verification sidecars [skip ci]"
            git push
          else
            echo "No sidecars to commit."
          fi
