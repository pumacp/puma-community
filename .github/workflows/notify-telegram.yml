# Recommended trigger (uncomment when TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID are configured and tested):
# push:
#   branches: [main]
#   paths: ['submissions/*.json']

name: notify-telegram

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out main with one parent
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check that Telegram credentials are configured
        id: check-secret
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Skipping: TELEGRAM_BOT_TOKEN and/or TELEGRAM_CHAT_ID not configured"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check-secret.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Find newly added submissions
        id: find-new
        if: steps.check-secret.outputs.skip == 'false'
        run: |
          set -euo pipefail
          files=$(git diff --name-only --diff-filter=A HEAD~1..HEAD -- 'submissions/*.json' 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "No new submission files in this commit. Nothing to notify."
            echo "files=" >> "$GITHUB_OUTPUT"
          else
            echo "Found new submissions:"
            echo "$files"
            {
              echo "files<<EOF"
              echo "$files"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Post to Telegram
        if: steps.check-secret.outputs.skip == 'false' && steps.find-new.outputs.files != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FILES: ${{ steps.find-new.outputs.files }}
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Notifying for $file"
            python3 scripts/notify.py --channel telegram --submission-file "$file"
          done <<< "$FILES"
