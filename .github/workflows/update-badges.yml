name: update-badges

on:
  push:
    branches: [main]
    paths:
      - 'submissions/*.json'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate badges
        run: python3 scripts/generate_badges.py

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "puma-community-bot"
          git config user.email "pumacapstoneproject@gmail.com"
          git add badges/
          if git diff --cached --quiet; then
            echo "No badge change; nothing to commit."
            exit 0
          fi
          git commit -m "chore(badges): refresh dynamic badges"
          git push
